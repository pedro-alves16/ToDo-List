<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ToDo</title>
</head>
<body>
    <div class="titleDiv">
        <h1 class="titulo-principal">Tarefas</h1>
        <p class="subtitulo">Mantenha o foco no que importa</p>
    </div>

    <div class="main-div">
        <div class="inputDiv">
            <img src="plus (2).svg" alt="">
        
            <input type="text" name="" id="input-tarefa" placeholder="Adicionar tarefa..." class="input-texto">
            <button id = 'botao-adicionar'>Adicionar</button>
        </div>
        <div class="lista-tarefas-div">
            <ul class="lista-tarefas">

            </ul>
        </div>
    </div>

    <div class="tarefasVazias">
        <p class="nenhuma-tarefa">Nenhuma tarefa ainda</p>
        <p class="subtitulo">Adicione sua primeira tarefa</p>
    </div>

    <p class="subtitulo footer">suas tarefas serão salvas automaticamente</p>

    <script src="script.js"></script>
</body>
</html>
